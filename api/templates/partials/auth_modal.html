<div class="auth-modal">
    <h2>Welcome to FootyHub</h2>

    <div class="auth-tabs">
        <button class="tab-btn {% if tab != 'register' %}active{% endif %}" onclick="showTab('login', this)">Login</button>
        <button class="tab-btn {% if tab == 'register' %}active{% endif %}" onclick="showTab('register', this)">Register</button>
    </div>

    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}

    <div id="tab-login" class="tab-content {% if tab == 'register' %}hidden{% endif %}">
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required autocomplete="username">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit">Login</button>
        </form>
    </div>

    <div id="tab-register" class="tab-content {% if tab != 'register' %}hidden{% endif %}">
        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Username" required autocomplete="username">
            <input type="password" name="password" placeholder="Password" required autocomplete="new-password">
            <button type="submit">Create account</button>
        </form>
    </div>
</div>

<script>
function showTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.remove('hidden');
    btn.classList.add('active');
}
</script>
